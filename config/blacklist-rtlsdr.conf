# Keep the DVB-T kernel drivers off the RTL2832 so librtlsdr/SatDump can claim
# the dongle. Without this the tuner is grabbed by dvb_usb_rtl28xxu at boot and
# SatDump fails with a USB claim error. Installed to /etc/modprobe.d/.
blacklist dvb_usb_rtl28xxu
blacklist rtl2832_sdr
blacklist rtl2832
blacklist rtl2830
blacklist dvb_usb_v2
